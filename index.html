<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Relativity Warp Rocket</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🌌 SPACE */
#space {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #050814, #000);
    overflow: hidden;
}

/* 🪐 PLANET */
#planet {
    position: absolute;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #6ec1ff, #1b2a4a 60%, #0b1020 100%);
    bottom: 80px;
    right: 120px;
    box-shadow: 0 0 60px rgba(80, 150, 255, 0.4);
}

/* ⭐ STARS (STATIC + TWINKLE) */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
    animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle {
    0%   { opacity: 0.2; transform: scale(1); }
    50%  { opacity: 1;   transform: scale(1.3); }
    100% { opacity: 0.3; transform: scale(1); }
}

/* 🚀 ROCKET */
#rocketWrapper {
    position: absolute;
    top: 50%;
    left: 50%;
}

#rocket {
    position: relative;
    width: 340px;
    height: 80px;
    transform-origin: center;
}

/* 🔺 NOSE */
.nose {
    position: absolute;
    left: 0;
    width: 0;
    height: 0;
    border-top: 40px solid transparent;
    border-bottom: 40px solid transparent;
    border-right: 55px solid #d7dde6;
}

/* 🚀 BODY */
.body {
    position: absolute;
    left: 45px;
    width: 250px;
    height: 80px;
    background: linear-gradient(145deg, #e3e8ef, #7d8896);
    border-radius: 40px;
}

/* 🔵 WINDOW */
.window {
    position: absolute;
    left: 140px;
    top: 22px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle, #8ff0ff, #1b4d66);
}

/* 🔥 ENGINES */
.engine {
    position: absolute;
    right: 10px;
    top: 18px;
    width: 22px;
    height: 28px;
    background: #2b2b2b;
}

.engine2 {
    position: absolute;
    right: 10px;
    top: 38px;
    width: 22px;
    height: 28px;
    background: #2b2b2b;
}

/* 🔥 FIRE */
.fire {
    position: absolute;
    right: -60px;
    top: 10px;
    width: 120px;
    height: 70px;
    background: radial-gradient(circle, orange 20%, red 60%, transparent 80%);
    border-radius: 50%;
    filter: blur(6px);
    animation: flicker 0.06s infinite alternate;
}

@keyframes flicker {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 1; }
}

/* 📊 HUD */
#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 14, 25, 0.85);
    padding: 20px;
    border-radius: 14px;
    min-width: 320px;
    box-shadow: 0 0 20px rgba(0,150,255,0.25);
}

#hud table {
    border-collapse: collapse;
    font-size: 22px;
    color: #d7f3ff;
    width: 100%;
}

#hud td {
    padding: 10px 18px;
}

#hud td:first-child {
    font-weight: bold;
    color: #8fd3ff;
}

/* 🎚 SLIDER */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

input[type=range] {
    width: 60%;
}
</style>
</head>

<body>

<div id="space"></div>

<div id="planet"></div>

<div id="rocketWrapper">
    <div id="rocket">
        <div class="nose"></div>
        <div class="body"></div>
        <div class="window"></div>
        <div class="engine"></div>
        <div class="engine2"></div>
        <div class="fire"></div>
    </div>
</div>

<!-- 📊 HUD -->
<div id="hud">
<table>
<tr><td>Velocity</td><td><span id="v">0</span> c</td></tr>
<tr><td>Gamma (γ)</td><td><span id="g">1</span></td></tr>
<tr><td>Length (rest)</td><td>100 m</td></tr>
<tr><td>Contracted Length</td><td><span id="L">100</span> m</td></tr>
</table>
</div>

<div id="controls">
<input type="range" min="0" max="0.99" step="0.01" value="0" id="slider">
</div>

<script>
const slider = document.getElementById("slider");

const vText = document.getElementById("v");
const gText = document.getElementById("g");
const LText = document.getElementById("L");

let space = document.getElementById("space");

/* ⭐ STATIC TWINKLING STARS */
for (let i = 0; i < 120; i++) {
    let s = document.createElement("div");
    s.className = "star";

    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";

    let size = Math.random() * 2 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";

    space.appendChild(s);
}

/* 🚀 ROCKET POSITION */
let x = window.innerWidth;

/* 📏 REST LENGTH */
const L0 = 100;

function update() {
    let v = parseFloat(slider.value);

    let gamma = 1 / Math.sqrt(1 - v * v);
    let contraction = Math.sqrt(1 - v * v);

    let L = L0 * contraction;

    document.getElementById("rocket").style.transform = `scaleX(${contraction})`;

    vText.textContent = v.toFixed(2);
    gText.textContent = gamma.toFixed(2);
    LText.textContent = L.toFixed(2);
}

/* 🚀 ANIMATION LOOP */
function animate() {
    let v = parseFloat(slider.value);

    x -= (2 + v * 10);
    document.getElementById("rocketWrapper").style.left = x + "px";

    if (x < -300) x = window.innerWidth + 200;

    update();

    requestAnimationFrame(animate);
}

slider.addEventListener("input", update);

animate();
update();
</script>

</body>
</html>
