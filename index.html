<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Relativity Warp Rocket - Mobile</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🌌 SPACE */
#space {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #050814, #000);
}

/* ⭐ STARS */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle {
    0% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
    100% { opacity: 0.3; transform: scale(1); }
}

/* 🪐 PLANET */
#planet {
    position: absolute;
    width: 45vw;
    height: 45vw;
    border-radius: 50%;
    bottom: 5vh;
    right: 5vw;

    box-shadow: 0 0 80px rgba(120,190,255,0.6);

    background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.9), transparent 18%),
        radial-gradient(circle at 70% 60%, #6d4c41, transparent 30%),
        radial-gradient(circle at 40% 40%, #2e7d32, transparent 35%),
        radial-gradient(circle at center, #2196f3, #08142b);
}

/* 🚀 ROCKET WRAPPER (MOVES) */
#rocketWrapper {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
}

/* 🚀 ROCKET */
#rocket {
    position: relative;
    width: 60vw;
    height: 14vw;
    transform-origin: center;
}

/* 🧠 NOSE */
.nose {
    position: absolute;
    left: 0;
    width: 0;
    height: 0;
    border-top: 7vw solid transparent;
    border-bottom: 7vw solid transparent;
    border-right: 10vw solid #d7dde6;
}

/* 🚀 BODY */
.body {
    position: absolute;
    left: 8vw;
    width: 45vw;
    height: 14vw;
    background: linear-gradient(145deg, #e3e8ef, #7d8896);
    border-radius: 7vw;
}

/* 🔵 WINDOW */
.window {
    position: absolute;
    left: 25vw;
    top: 3.5vw;
    width: 6vw;
    height: 6vw;
    border-radius: 50%;
    background: radial-gradient(circle, #8ff0ff, #1b4d66);
}

/* 🔥 ENGINES */
.engine {
    position: absolute;
    right: 2vw;
    top: 3vw;
    width: 4vw;
    height: 5vw;
    background: #2b2b2b;
}

.engine2 {
    position: absolute;
    right: 2vw;
    top: 8vw;
    width: 4vw;
    height: 5vw;
    background: #2b2b2b;
}

/* 🔥 FIRE */
.fire {
    position: absolute;
    right: -8vw;
    top: 50%;
    transform: translate(0, -50%);
    width: 18vw;
    height: 10vw;

    background: radial-gradient(circle,
        orange 20%,
        red 60%,
        transparent 80%);

    border-radius: 50%;
    filter: blur(4px);
    animation: flicker 0.06s infinite alternate;
}

@keyframes flicker {
    0% { transform: translate(0, -50%) scale(1); opacity: 0.7; }
    100% { transform: translate(0, -50%) scale(1.5); opacity: 1; }
}

/* 📊 HUD (BIGGER TEXT) */
#hud {
    position: absolute;
    top: 2vh;
    left: 2vw;

    background: rgba(10, 14, 25, 0.85);
    padding: 14px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
}

#hud table {
    font-size: 18px; /* 🔥 BIGGER */
    color: #d7f3ff;
}

#hud td {
    padding: 6px 10px; /* 🔥 BIGGER SPACING */
}

#hud td:first-child {
    color: #8fd3ff;
    font-weight: bold;
}

/* 🎚 SLIDER */
#controls {
    position: absolute;
    bottom: 3vh;
    width: 100%;
    text-align: center;
}

input[type=range] {
    width: 85%;
}
</style>
</head>

<body>

<div id="space"></div>

<div id="planet"></div>

<div id="rocketWrapper">
    <div id="rocket">
        <div class="nose"></div>
        <div class="body"></div>
        <div class="window"></div>
        <div class="engine"></div>
        <div class="engine2"></div>
        <div class="fire"></div>
    </div>
</div>

<!-- 📊 HUD -->
<div id="hud">
<table>
<tr><td>Velocity</td><td><span id="v">0</span> c</td></tr>
<tr><td>Gamma</td><td><span id="g">1</span></td></tr>
<tr><td>Length</td><td><span id="L">100</span> m</td></tr>
</table>
</div>

<div id="controls">
<input type="range" min="0" max="0.99" step="0.01" value="0" id="slider">
</div>

<script>
const slider = document.getElementById("slider");

const vText = document.getElementById("v");
const gText = document.getElementById("g");
const LText = document.getElementById("L");

let space = document.getElementById("space");

/* ⭐ STARS */
for (let i = 0; i < 80; i++) {
    let s = document.createElement("div");
    s.className = "star";

    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";

    let size = Math.random() * 2 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";

    space.appendChild(s);
}

/* 🚀 ROCKET MOVEMENT */
let x = 0;

function animate() {
    let v = parseFloat(slider.value);

    // 🚀 rocket moves right faster as velocity increases
    x += 2 + v * 10;

    document.getElementById("rocketWrapper").style.left = x + "px";

    if (x > window.innerWidth + 200) {
        x = -200;
    }

    requestAnimationFrame(animate);
}

/* 📊 PHYSICS */
function update() {
    let v = parseFloat(slider.value);

    let gamma = 1 / Math.sqrt(1 - v * v);
    let contraction = Math.sqrt(1 - v * v);

    let L = 100 * contraction;

    document.getElementById("rocket").style.transform =
        `scale(${contraction}, 1)`;

    vText.textContent = v.toFixed(2);
    gText.textContent = gamma.toFixed(2);
    LText.textContent = L.toFixed(1);
}

slider.addEventListener("input", update);

update();
animate();
</script>

</body>
</html>
