<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Relativity Warp Rocket + Planet</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #02040a, #000);
    font-family: Arial, sans-serif;
    color: white;
    height: 100vh;
}

/* ⭐ STARS */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
}

/* 🪐 PLANET (NEW MODEL) */
#planet {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    bottom: 5vh;
    right: 5vw;

    background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 20%),
        radial-gradient(circle at 70% 60%, #2e7d32, transparent 40%),
        radial-gradient(circle at 40% 40%, #1e88e5, #0b1d3a);

    box-shadow:
        0 0 40px rgba(0,150,255,0.6),
        inset -40px -40px 80px rgba(0,0,0,0.6);

    animation: rotatePlanet 20s linear infinite;
}

#planet::after {
    content: "";
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,150,255,0.3), transparent 70%);
    z-index: -1;
}

#planet::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
        radial-gradient(circle at 60% 40%, rgba(0,255,100,0.25), transparent 25%),
        radial-gradient(circle at 30% 70%, rgba(0,255,100,0.2), transparent 30%);
    mix-blend-mode: overlay;
}

@keyframes rotatePlanet {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* 🚀 ROCKET WRAPPER */
#rocketWrapper {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
}

#rocket {
    position: relative;
    width: 65vw;
    height: 18vw;
}

.nose {
    position: absolute;
    right: 0;
    width: 0;
    height: 0;
    border-top: 9vw solid transparent;
    border-bottom: 9vw solid transparent;
    border-left: 14vw solid #ff5252;
}

.body {
    position: absolute;
    left: 8vw;
    top: 2vw;
    width: 45vw;
    height: 14vw;
    background: linear-gradient(145deg, #f2f5f9, #8b97a8);
    border-radius: 7vw;
    box-shadow: inset -1vw -1vw 2vw rgba(0,0,0,0.35);
}

.window {
    position: absolute;
    left: 24vw;
    top: 5vw;
    width: 5vw;
    height: 5vw;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #dfffff, #3ca6d8, #0a2a4d);
    border: 0.4vw solid white;
}

.finTop {
    position: absolute;
    left: 12vw;
    top: -1vw;
    border-bottom: 7vw solid #ff9800;
    border-right: 7vw solid transparent;
}

.finBottom {
    position: absolute;
    left: 12vw;
    bottom: -1vw;
    border-top: 7vw solid #ff9800;
    border-right: 7vw solid transparent;
}

.engine {
    position: absolute;
    left: 2vw;
    top: 5vw;
    width: 6vw;
    height: 7vw;
    background: linear-gradient(145deg, #444, #111);
    border-radius: 1vw;
}

.fire {
    position: absolute;
    left: -12vw;
    top: 50%;
    transform: translateY(-50%);
    width: 14vw;
    height: 8vw;
}

.fire::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle,
        #ffffff 0%,
        #ffeb3b 20%,
        #ff9800 45%,
        #ff3d00 70%,
        transparent 85%);
    border-radius: 50%;
    filter: blur(4px);
    animation: flameFlicker 0.07s infinite alternate;
}

.fire::after {
    content: "";
    position: absolute;
    width: 60%;
    height: 60%;
    left: 20%;
    top: 20%;
    background: radial-gradient(circle, white, #ffd54f, transparent 75%);
    border-radius: 50%;
    animation: corePulse 0.05s infinite alternate;
}

@keyframes flameFlicker {
    from { transform: scale(0.8); }
    to { transform: scale(1.5); }
}

@keyframes corePulse {
    from { transform: scale(0.8); }
    to { transform: scale(1.2); }
}

#hud {
    position: absolute;
    top: 2vh;
    left: 2vw;
    background: rgba(10, 14, 25, 0.85);
    padding: 24px;
    border-radius: 16px;
    transform: scale(1.3);
    transform-origin: top left;
}

#hud table {
    font-size: 28px;
}

#hud td {
    padding: 10px 16px;
}

#controls {
    position: absolute;
    bottom: 3vh;
    width: 100%;
    text-align: center;
}

input[type=range] {
    width: 85%;
}
</style>

</head>

<body>

<div id="space"></div>
<div id="planet"></div>

<div id="rocketWrapper">
    <div id="rocket">
        <div class="fire"></div>
        <div class="engine"></div>
        <div class="finTop"></div>
        <div class="finBottom"></div>
        <div class="body"></div>
        <div class="window"></div>
        <div class="nose"></div>
    </div>
</div>

<div id="hud">
<table>
<tr><td>Velocity</td><td><span id="v">0</span> c</td></tr>
<tr><td>Gamma</td><td><span id="g">1</span></td></tr>
<tr><td>Length</td><td><span id="L">100</span> m</td></tr>
</table>
</div>

<div id="controls">
<input type="range" min="0" max="0.99" step="0.01" value="0" id="slider">
</div>

<script>
const slider = document.getElementById("slider");
const vText = document.getElementById("v");
const gText = document.getElementById("g");
const LText = document.getElementById("L");
const rocketWrapper = document.getElementById("rocketWrapper");

let x = -300;

let space = document.getElementById("space");
for (let i = 0; i < 100; i++) {
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.top = Math.random() * window.innerHeight + "px";
    let size = Math.random() * 2;
    s.style.width = size + "px";
    s.style.height = size + "px";
    space.appendChild(s);
}

function animate() {
    let v = parseFloat(slider.value);
    x += (2 + v * 10);
    rocketWrapper.style.left = x + "px";
    if (x > window.innerWidth + 300) x = -300;
    requestAnimationFrame(animate);
}

function update() {
    let v = parseFloat(slider.value);
    let gamma = 1 / Math.sqrt(1 - v * v);
    let contraction = Math.sqrt(1 - v * v);

    document.getElementById("rocket").style.transform = `scale(${contraction},1)`;

    vText.textContent = v.toFixed(2);
    gText.textContent = gamma.toFixed(2);
    LText.textContent = (100 * contraction).toFixed(1);
}

slider.addEventListener("input", update);
update();
animate();
</script>

</body>
</html>
